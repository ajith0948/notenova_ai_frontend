<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | NoteNova AI</title>
    <link rel="stylesheet" href="payment.css">
    <style>
        /* Styling for the new input box */
        .txn-input-container {
            margin-bottom: 25px;
            text-align: left;
        }

        .txn-input-container label {
            display: block;
            margin-bottom: 8px;
            color: #0a2540;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .txn-input-container input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #d8e1ea;
            background: #f9fbff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .txn-input-container input:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.15);
        }
    </style>
</head>

<body>

    <header class="navbar">
        <h1 class="brand-title">
            <span class="logo-n-nav">
                <img src="bcaecf6e-263d-4a7d-95c4-0d7856e9bc27.png" alt="Logo">
            </span>
            oteNova AI
        </h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="product.html">Product</a>
            <a href="sub.html">Premium</a>
            <span id="authArea"></span>
        </nav>
    </header>

    <section class="payment-section">
        <div class="payment-card">
            <h2>Complete Your Payment</h2>

            <p>Scan the QR code below using any UPI app to pay <strong>₹500</strong> for Premium.</p>

            <div class="qr-container">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=YOUR_UPI_ID_HERE&pn=NoteNovaAI&am=500.00&cu=INR"
                    alt="Payment QR Code">
            </div>

            <div class="txn-input-container">
                <label for="txnId">Enter Transaction ID / UPI Ref Number:</label>
                <input type="text" id="txnId" placeholder="e.g., 312345678901" required>
            </div>

            <p class="warning-text">
                ⚠️ Important: It may take up to 7 business days to manually verify your payment.
            </p>

            <button id="paidBtn" onclick="reportPayment()">Submit Payment Details</button>
            <p id="loader" class="loader">Sending verification request...</p>

        </div>
    </section>

    <script>
        // 1. Check if user is logged in
        const user = JSON.parse(localStorage.getItem("loggedInUser"));
        const authArea = document.getElementById("authArea");

        if (!user) {
            alert("You must be logged in to purchase premium.");
            window.location.href = "login.html";
        } else {
            authArea.innerHTML = `<a href="profile.html">Profile</a>`;
        }

        // 2. Handle Payment Report
        async function reportPayment() {
            // Get the value they typed in the box
            const txnIdValue = document.getElementById("txnId").value.trim();

            // Stop them if the box is empty
            if (!txnIdValue) {
                alert("Please enter your Transaction ID before submitting!");
                return;
            }

            const btn = document.getElementById("paidBtn");
            const loader = document.getElementById("loader");

            btn.disabled = true;
            loader.style.display = "block";

            try {
                // --- UPDATED RENDER URL HERE ---
                const response = await fetch("https://notenova-backend-pznb.onrender.com/api/auth/request-premium", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    // Send BOTH the email and the transaction ID
                    body: JSON.stringify({
                        email: user.email,
                        transactionId: txnIdValue
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert(data.message);
                    window.location.href = "profile.html";
                } else {
                    alert("Error: " + data.message);
                    btn.disabled = false;
                    loader.style.display = "none";
                }
            } catch (error) {
                alert("Server error. Please try again later.");
                console.log(error);
                btn.disabled = false;
                loader.style.display = "none";
            }
        }
    </script>

</body>

</html>
