<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login | NoteNova AI</title>

  <link rel="stylesheet" href="log.css">
</head>

<body>

  <div class="container">

    <div class="form-box">

      <h1 id="title">Login</h1>

      <!-- SIGNUP FORM -->

      <!-- SIGNUP FORM -->

      <div id="signupForm">

        <input type="text" id="signupName" placeholder="Full Name">

        <input type="email" id="signupEmail" placeholder="Email">

        <input type="tel" id="signupPhone" placeholder="Phone Number">

        <input type="date" id="signupDob">

        <input type="password" id="signupPassword" placeholder="Password (min 7 chars)" required minlength="7">

        <button onclick="signup()">
          Create Account
        </button>

      </div>
      <!-- LOGIN FORM -->

      <div id="loginForm">

        <input type="email" id="loginEmail" placeholder="Email">

       <input type="password" id="loginPassword" placeholder="Password (min 7 chars)" required minlength="7">
        <button onclick="login()">
          Login
        </button>

      </div>

      <!-- SWITCH -->

      <p id="switchText">
        Don't have an account?
        <span onclick="showSignup()">Sign Up</span>
      </p>

    </div>

  </div>

  <script>

    const loginForm = document.getElementById("loginForm");
    const signupForm = document.getElementById("signupForm");
    const title = document.getElementById("title");
    const switchText = document.getElementById("switchText");

    // START WITH LOGIN
    signupForm.style.display = "none";

    // SHOW SIGNUP

    function showSignup() {

      signupForm.style.display = "flex";
      loginForm.style.display = "none";

      title.innerText = "Sign Up";

      switchText.innerHTML =
        `Already have an account?
      <span onclick="showLogin()">Login</span>`;

    }

    // SHOW LOGIN

    function showLogin() {

      signupForm.style.display = "none";
      loginForm.style.display = "flex";

      title.innerText = "Login";

      switchText.innerHTML =
        `Don't have an account?
      <span onclick="showSignup()">Sign Up</span>`;

    }

    async function signup() {

      const name =
        document.getElementById("signupName").value;

      const email =
        document.getElementById("signupEmail").value;

      const phone =
        document.getElementById("signupPhone").value;

      const dob =
        document.getElementById("signupDob").value;

      const password =
        document.getElementById("signupPassword").value;

      try {

        const response = await fetch(
          "https://notenova-backend-pznb.onrender.com/api/auth/signup",
          {

            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify({
              name,
              email,
              phone,
              dob,
              password
            })

          }
        );

        const data = await response.json();

        alert(data.message);

        if (response.ok) {

          showLogin();

        }

      } catch (error) {

        alert("Server Error");

        console.log(error);

      }

    }

    // LOGIN

    async function login() {

      const email =
        document.getElementById("loginEmail").value;

      const password =
        document.getElementById("loginPassword").value;

      try {

        const response = await fetch(
          "https://notenova-backend-pznb.onrender.com/api/auth/login",
          {

            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify({
              email,
              password
            })

          }
        );

        const data = await response.json();

        alert(data.message);

        if (response.ok) {

          localStorage.setItem(
            "loggedInUser",
            JSON.stringify(data.user)
          );

          window.location.href = "index.html";

        }

      } catch (error) {

        alert("Server Error");

        console.log(error);

      }

    }

  </script>

</body>

</html>
