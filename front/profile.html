<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile | NoteNova AI</title>

    <link rel="stylesheet" href="proo.css">
</head>

<body>

    <!-- NAVBAR -->

    <header class="navbar">

        <h1 class="brand-title">

            <span class="logo-n-nav">
                <img src="bcaecf6e-263d-4a7d-95c4-0d7856e9bc27.png" alt="Logo">
            </span>

            oteNova AI

        </h1>

        <nav>

            <a href="index.html">Home</a>

            <a href="product.html">Product</a>

            <a href="sub.html">Premium</a>

            <a href="c2.html">Contact</a>

        </nav>

    </header>

    <!-- PROFILE -->

    <section class="profile-section">

        <div class="profile-card">

            <!-- TOP -->

            <div class="profile-top">

                <div class="avatar">

                    <span id="avatarLetter"></span>

                </div>

                <div>

                    <h1 id="profileName"></h1>

                    <p class="welcome-text">

                        Welcome back to NoteNova AI

                    </p>

                </div>

            </div>

            <!-- GRID -->

            <div class="profile-grid">

                <div class="info-box">

                    <span>Email Address</span>

                    <h3 id="email"></h3>

                </div>

                <div class="info-box">

                    <span>Phone Number</span>

                    <h3 id="phone"></h3>

                </div>

                <div class="info-box">

                    <span>Date of Birth</span>

                    <h3 id="dob"></h3>

                </div>

                <div class="info-box premium-box">

                    <span>Membership</span>

                    <h3 id="premium"></h3>

                </div>

            </div>

            <!-- BUTTON -->

            <button id="logoutBtn">

                Sign Out

            </button>

        </div>

    </section>

    <script>
        const localUser = JSON.parse(localStorage.getItem("loggedInUser"));

        // PROTECT PAGE
        if (!localUser) {
            window.location.href = "login.html";
        }

        // FUNCTION TO FETCH LIVE DATA
        async function fetchFreshUserData() {
            try {
                const response = await fetch(`https://notenova-backend-pznb.onrender.com/api/auth/user/${localUser.email}`);
                const freshUser = await response.json();

                // Update localStorage with the latest data
                localStorage.setItem("loggedInUser", JSON.stringify(freshUser));

                // UPDATE UI
                document.getElementById("profileName").innerText = freshUser.name;
                document.getElementById("avatarLetter").innerText = freshUser.name.charAt(0).toUpperCase();
                document.getElementById("email").innerText = freshUser.email;
                document.getElementById("phone").innerText = freshUser.phone;
                document.getElementById("dob").innerText = freshUser.dob;

                const premiumElement = document.getElementById("premium");

                // Check Premium Status & Timer
                if (freshUser.premium && freshUser.premiumExpiry) {
                    premiumElement.innerHTML = `Premium User ✨ <br><span id="timer" style="color:#ff4757; font-size:14px; font-weight:bold;"></span>`;
                    startCountdown(freshUser.premiumExpiry);
                } else if (freshUser.premium) {
                    premiumElement.innerText = "Premium User ✨ (Lifetime)";
                } else {
                    premiumElement.innerText = "Free Plan";
                }

            } catch (error) {
                console.log("Error fetching fresh data:", error);
            }
        }

        // TIMER FUNCTION
        function startCountdown(expiryDateString) {
            const expiryDate = new Date(expiryDateString).getTime();

            const timerInterval = setInterval(() => {
                const now = new Date().getTime();
                const distance = expiryDate - now;

                if (distance < 0) {
                    clearInterval(timerInterval);
                    document.getElementById("timer").innerText = "Expired! Refreshing...";
                    setTimeout(() => window.location.reload(), 2000); // Reload page to revert to free plan
                } else {
                    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                    document.getElementById("timer").innerText = `Expires in: ${minutes}m ${seconds}s`;
                }
            }, 1000);
        }

        // LOGOUT
        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("loggedInUser");
            window.location.href = "index.html";
        });

        // Run fetch on load
        fetchFreshUserData();
    </script>

</body>

</html>
